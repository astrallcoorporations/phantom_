<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>phantom_ — sign in</title>
  <script>try{var p=(JSON.parse(localStorage.getItem("phantom.db.v1")||"{}").prefs||{}).skin||"dark";if(p==="onyx")p="midnight";if(p==="contrast")p="dark";document.documentElement.dataset.skin=p==="system"?(matchMedia("(prefers-color-scheme: light)").matches?"light":"dark"):p}catch(e){}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/phantom.css') }}">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#080808">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/static/img/icon-192.png">
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body class="landing land3">
  {% include "_icons.html" %}
  <div class="grain" aria-hidden="true"></div>

  <div class="auth-wrap">
    <main class="auth-card panel" aria-label="Sign in or create an account">
      <div class="mono" data-logo4 style="font-size:15px;letter-spacing:0.14em;margin-bottom:8px">&gt; PHANTOM_</div>
      <p class="mono" style="color:var(--p-text-4);font-size:11px;letter-spacing:0.08em;margin-bottom:24px">zero-trust comms for developers</p>

      {% if error %}<div class="auth-error" role="alert">{{ error }}</div>{% endif %}
      <div class="auth-error" id="auth-error" role="alert" hidden></div>

      <a class="btn mono" href="{{ url_for('github_auth') }}"
         style="width:100%;height:48px;background:var(--acc-blue);color:#fff;border-color:transparent;font-size:12.5px;letter-spacing:0.06em">
        Continue with GitHub
      </a>
      <a class="btn mono" href="{{ url_for('google_auth') }}"
         style="width:100%;height:48px;margin-top:8px;font-size:12.5px;letter-spacing:0.06em">
        Continue with Google
      </a>
      <a class="btn btn--quiet mono" href="{{ url_for('auth_guest') }}"
         style="width:100%;height:42px;margin-top:8px;font-size:12px;color:var(--p-text-4)">
        $ guest --ephemeral
      </a>

      <div class="auth-divider" aria-hidden="true">OR</div>

      <div class="auth-tabs" role="tablist" aria-label="Sign in or sign up">
        <button role="tab" aria-selected="true" data-auth-tab="login">Sign in</button>
        <button role="tab" aria-selected="false" data-auth-tab="signup">Create account</button>
      </div>

      <form id="login-form" data-auth-pane="login">
        <div class="field">
          <input type="text" name="identity" placeholder="username or email" autocomplete="username" aria-label="Username or email" required>
        </div>
        <div class="field">
          <input type="password" name="password" placeholder="password" autocomplete="current-password" aria-label="Password" required>
        </div>
        <button class="btn mono" type="submit"
                style="width:100%;height:44px;background:var(--acc-blue);color:#fff;border-color:transparent">Sign in</button>
      </form>

      <form id="signup-form" data-auth-pane="signup" hidden>
        <div class="field">
          <span class="mono" style="color:var(--p-text-4);font-size:13px">@</span>
          <input type="text" name="username" placeholder="username" autocomplete="username" aria-label="Username" required>
        </div>
        <div class="field">
          <input type="email" name="email" placeholder="email" autocomplete="email" aria-label="Email" required>
        </div>
        <div class="field">
          <input type="password" name="password" placeholder="password (6+ characters)" autocomplete="new-password" minlength="6" aria-label="Password" required>
        </div>
        <button class="btn mono" type="submit"
                style="width:100%;height:44px;background:var(--acc-blue);color:#fff;border-color:transparent">Create account</button>
      </form>

      <p style="margin-top:22px" class="label">E2E ENCRYPTED · ZERO TRACKERS · PASSWORDS HASHED</p>
    </main>
  </div>

  <script src="{{ url_for('static', filename='js/phantom.js') }}"></script>
  <script>
    (function () {
      const err = document.getElementById("auth-error");
      function fail(msg) { err.textContent = msg; err.hidden = false; }
      document.querySelectorAll("[data-auth-tab]").forEach((tab) => {
        tab.addEventListener("click", () => {
          document.querySelectorAll("[data-auth-tab]").forEach((b) => b.setAttribute("aria-selected", String(b === tab)));
          document.querySelectorAll("[data-auth-pane]").forEach((p) => { p.hidden = p.dataset.authPane !== tab.dataset.authTab; });
          err.hidden = true;
        });
      });
      async function submit(url, payload, next) {
        try {
          const res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
          const data = await res.json();
          if (!res.ok) return fail(data.error || "Something went wrong.");
          window.location.href = next;
        } catch { fail("Could not reach the server."); }
      }
      document.getElementById("login-form").addEventListener("submit", (e) => {
        e.preventDefault();
        submit("/api/login", { identity: e.target.identity.value, password: e.target.password.value }, "/app");
      });
      document.getElementById("signup-form").addEventListener("submit", (e) => {
        e.preventDefault();
        submit("/api/signup", { username: e.target.username.value, email: e.target.email.value, password: e.target.password.value }, "/onboarding");
      });
    })();
  </script>
  <script>if("serviceWorker" in navigator){addEventListener("load",function(){navigator.serviceWorker.register("/sw.js").catch(function(){})})}</script>
</body>
</html>
